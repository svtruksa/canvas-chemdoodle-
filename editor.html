<h2>Draw your molecule:</h2>
<div id="sketcher"></div>
<button onclick="submitMolecule()">Submit Molecule</button>
<div id="preview"></div>

<script>
  let sketcher = new ChemDoodle.SketcherCanvas('sketcher', 500, 300, {useServices:true, oneMolecule:true});

 function updatePreview() {
   const mol = sketcher.getMolecule();
    if(mol.atoms.length > 0){
      const img = new ChemDoodle.io.png.MolCanvas('preview', 300, 200);
      img.loadMolecule(mol);
    }
  }

  sketcher.repaint = () => {
    ChemDoodle.SketcherCanvas.prototype.repaint.call(sketcher);
    updatePreview();
  }
