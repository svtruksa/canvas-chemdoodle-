<script>

<canvas id="molCanvas" width="400" height="400"></canvas>

<script>
  // Create 3D canvas
  let molCanvas = new ChemDoodle.TransformCanvas3D('molCanvas', 400, 400);

  // Example molecule (water)
  let mol = ChemDoodle.readXYZ(`
3
water
O 0.000 0.000 0.000
H 0.758 0.000 0.504
H -0.758 0.000 0.504
`);

  canvas.loadMolecule(mol);
</script>
